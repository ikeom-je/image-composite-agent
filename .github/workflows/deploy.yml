# CD パイプライン - AWS デプロイ
# mainブランチへのpush時に実行（手動トリガーも可能）
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "デプロイ対象"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - backend
          - frontend

permissions:
  id-token: write
  contents: read

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"
  AWS_REGION: us-east-1

jobs:
  # -------------------------------------------------------
  # 1. CI チェック（デプロイ前にビルド・テスト通過を確認）
  # -------------------------------------------------------
  ci-check:
    name: CI Check
    uses: ./.github/workflows/ci.yml

  # -------------------------------------------------------
  # 2. バックエンドデプロイ（CDK - API Gateway, Lambda, S3等）
  # -------------------------------------------------------
  deploy-backend:
    name: Deploy Backend
    needs: ci-check
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.target == 'all' ||
      github.event.inputs.target == 'backend'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: npm ci

      - name: TypeScript build
        run: npm run build

      - name: Deploy ImageProcessorApiStack
        run: npx cdk deploy ImageProcessorApiStack --require-approval never
        env:
          AGENTMODEL: ${{ vars.AGENTMODEL || 'us.anthropic.claude-sonnet-4-5-20250929-v1:0' }}

  # -------------------------------------------------------
  # 3. フロントエンドデプロイ（CDK - S3 + CloudFront）
  # -------------------------------------------------------
  deploy-frontend:
    name: Deploy Frontend
    needs: [ci-check, deploy-backend]
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.target == 'all' ||
      github.event.inputs.target == 'frontend'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install root dependencies
        run: npm ci

      - name: TypeScript build
        run: npm run build

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Deploy FrontendStack
        run: npx cdk deploy FrontendStack --require-approval never

      - name: Generate config.json & sync to S3
        run: |
          # API Stack出力からconfig.jsonを生成
          API_URL=$(aws cloudformation describe-stacks --stack-name ImageProcessorApiStack \
            --query "Stacks[0].Outputs[?ExportName=='ImageProcessorApiEndpoint'].OutputValue" --output text)
          UPLOAD_URL=$(aws cloudformation describe-stacks --stack-name ImageProcessorApiStack \
            --query "Stacks[0].Outputs[?ExportName=='ImageProcessorUploadApiEndpoint'].OutputValue" --output text)
          CHAT_URL=$(aws cloudformation describe-stacks --stack-name ImageProcessorApiStack \
            --query "Stacks[0].Outputs[?ExportName=='ImageProcessorChatApiEndpoint'].OutputValue" --output text)
          CF_DOMAIN=$(aws cloudformation describe-stacks --stack-name FrontendStack \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionDomain'].OutputValue" --output text)
          VERSION=$(node -p "require('./package.json').version")
          BUILD_HASH=${GITHUB_SHA::7}

          cat > frontend/dist/config.json <<EOF
          {
            "apiUrl": "${API_URL}",
            "uploadApiUrl": "${UPLOAD_URL}",
            "chatApiUrl": "${CHAT_URL}",
            "cloudfrontUrl": "https://${CF_DOMAIN}",
            "version": "${VERSION}",
            "buildHash": "${BUILD_HASH}",
            "environment": "production",
            "buildTimestamp": "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)",
            "region": "${{ env.AWS_REGION }}",
            "features": {
              "enableS3Upload": true,
              "enable3ImageComposition": true,
              "enableDebugMode": false,
              "enableAnalytics": true,
              "enableCaching": true,
              "enableErrorReporting": true
            }
          }
          EOF

      - name: Update Lambda CLOUDFRONT_DOMAIN
        run: |
          CF_DOMAIN=$(aws cloudformation describe-stacks --stack-name FrontendStack \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionDomain'].OutputValue" --output text)
          if [ -n "$CF_DOMAIN" ]; then
            for FUNC_NAME in $(aws lambda list-functions \
              --query "Functions[?starts_with(FunctionName, 'ImageProcessorApiStack-ImageProcessor') || starts_with(FunctionName, 'ImageProcessorApiStack-AgentFunction')].FunctionName" \
              --output text); do
              CURRENT_ENV=$(aws lambda get-function-configuration --function-name "$FUNC_NAME" --query "Environment.Variables" --output json)
              UPDATED_ENV=$(echo "$CURRENT_ENV" | python3 -c "import sys,json; d=json.load(sys.stdin); d['CLOUDFRONT_DOMAIN']='${CF_DOMAIN}'; print(json.dumps({'Variables':d}))")
              aws lambda update-function-configuration --function-name "$FUNC_NAME" --environment "$UPDATED_ENV" --no-cli-pager > /dev/null
            done
            echo "CLOUDFRONT_DOMAIN updated to ${CF_DOMAIN}"
          fi
