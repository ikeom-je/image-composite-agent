AWSTemplateFormatVersion: "2010-09-09"
Description: GitHub Actions OIDC Provider + Deploy Role for image-composite-agent

Parameters:
  GitHubOrg:
    Type: String
    Default: ikeom-je
  GitHubRepo:
    Type: String
    Default: image-composite-agent

Resources:
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1

  GitHubActionsDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: github-actions-image-compositor-deploy
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !GetAtt GitHubOIDCProvider.Arn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubOrg}/${GitHubRepo}:*"
      Policies:
        - PolicyName: cdk-deploy-policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: CDKDeploy
                Effect: Allow
                Action:
                  - cloudformation:*
                  - s3:*
                  - lambda:*
                  - apigateway:*
                  - sqs:*
                  - dynamodb:*
                  - logs:*
                  - cloudwatch:*
                  - cloudfront:*
                  - iam:*
                  - sts:AssumeRole
                  - ssm:GetParameter
                Resource: "*"
              - Sid: BedrockInvoke
                Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: "*"

Outputs:
  DeployRoleArn:
    Description: GitHub Secrets AWS_DEPLOY_ROLE_ARN に設定する値
    Value: !GetAtt GitHubActionsDeployRole.Arn
  OIDCProviderArn:
    Description: OIDC Provider ARN
    Value: !GetAtt GitHubOIDCProvider.Arn
