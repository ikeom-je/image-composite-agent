AWSTemplateFormatVersion: "2010-09-09"
Description: GitHub Actions OIDC Provider + Deploy Role for image-composite-agent

Parameters:
  GitHubOrg:
    Type: String
    Default: ikeom-je
  GitHubRepo:
    Type: String
    Default: image-composite-agent

Resources:
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1

  GitHubActionsDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: github-actions-image-compositor-deploy
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !GetAtt GitHubOIDCProvider.Arn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub:
                  - !Sub "repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/main"
                  - !Sub "repo:${GitHubOrg}/${GitHubRepo}:environment:production"
      Policies:
        - PolicyName: cdk-deploy-policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: CDKDeploy
                Effect: Allow
                Action:
                  - cloudformation:*
                  - s3:*
                  - lambda:*
                  - apigateway:*
                  - sqs:*
                  - dynamodb:*
                  - logs:*
                  - cloudwatch:*
                  - cloudfront:*
                  - sts:AssumeRole
                  - ssm:GetParameter
                Resource: "*"
              - Sid: IAMScoped
                Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:GetRole
                  - iam:GetRolePolicy
                  - iam:ListRolePolicies
                  - iam:ListAttachedRolePolicies
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PassRole
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:CreateServiceLinkedRole
                  - iam:CreatePolicy
                  - iam:DeletePolicy
                  - iam:GetPolicy
                  - iam:GetPolicyVersion
                  - iam:ListPolicyVersions
                  - iam:CreatePolicyVersion
                  - iam:DeletePolicyVersion
                Resource:
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/ImageProcessorApiStack-*"
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/FrontendStack-*"
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/ImageCompositeViewerStack-*"
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/cdk-*"
                  - !Sub "arn:aws:iam::${AWS::AccountId}:policy/ImageProcessorApiStack-*"
                  - !Sub "arn:aws:iam::${AWS::AccountId}:policy/FrontendStack-*"
                  - !Sub "arn:aws:iam::${AWS::AccountId}:policy/cdk-*"
              - Sid: BedrockInvoke
                Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: "*"

Outputs:
  DeployRoleArn:
    Description: GitHub Secrets AWS_DEPLOY_ROLE_ARN に設定する値
    Value: !GetAtt GitHubActionsDeployRole.Arn
  OIDCProviderArn:
    Description: OIDC Provider ARN
    Value: !GetAtt GitHubOIDCProvider.Arn
